<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Memory Manager · Debug Console</title>
<style>
:root {
  --bg: #0f1117; --bg2: #1a1d27; --bg3: #252836; --border: #2e3348;
  --text: #e4e6ef; --text2: #9399b2; --accent: #6c8cff; --accent2: #4ade80;
  --danger: #f87171; --warn: #fbbf24; --sys-bg: #1e3a5f; --mem-bg: #2a2a35;
  --radius: 6px; --font: "Segoe UI", system-ui, sans-serif;
  --mono: "Cascadia Code", "Fira Code", monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.container { display: flex; flex: 1; overflow: hidden; }
aside { background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; }
.sidebar-left { width: 200px; min-width: 160px; }
.sidebar-middle { width: 220px; min-width: 180px; }
.sidebar-title { padding: 12px 14px 8px; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--text2); }
.sidebar-item { padding: 8px 14px; cursor: pointer; font-size: 13px; border-left: 3px solid transparent; }
.sidebar-item:hover { background: var(--bg3); }
.sidebar-item.active { background: var(--bg3); border-left-color: var(--accent); color: var(--accent); }
.sidebar-item small { display: block; color: var(--text2); font-size: 11px; margin-top: 2px; }
.sidebar-add { padding: 8px 14px; }
.sidebar-add input { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 6px 8px; border-radius: var(--radius); font-size: 12px; }
.sidebar-add button { margin-top: 6px; width: 100%; padding: 6px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; font-size: 12px; }
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.tabs { display: flex; gap: 2px; padding: 8px 12px 0; background: var(--bg2); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.tabs button { padding: 8px 16px; background: transparent; border: none; color: var(--text2); cursor: pointer; font-size: 13px; border-radius: var(--radius) var(--radius) 0 0; }
.tabs button.active { background: var(--bg); color: var(--accent); border: 1px solid var(--border); border-bottom-color: var(--bg); }
.tab-content { flex: 1; overflow-y: auto; padding: 16px 20px; }
.panel { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
.panel h3 { font-size: 14px; margin-bottom: 12px; color: var(--text2); }
label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
input[type=text], input[type=number], textarea, select {
  width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  padding: 8px 10px; border-radius: var(--radius); font-size: 13px; font-family: inherit; margin-bottom: 10px;
}
textarea { font-family: var(--mono); font-size: 12px; min-height: 80px; resize: vertical; }
textarea.json-editor { min-height: 120px; }
.row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
.row > * { flex: 1; min-width: 120px; }
.form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 4px; }
.form-row .field { display: flex; flex-direction: column; min-width: 0; }
.form-row .field-grow { flex: 1 1 220px; }
.form-row .field-sm { flex: 0 0 72px; }
.form-row .field-md { flex: 0 0 130px; }
.form-row .field-action { flex: 0 0 auto; }
.form-row label { margin-bottom: 4px; }
.form-row input, .form-row select { margin-bottom: 0; width: 100%; box-sizing: border-box; }
.form-row .field-action .btn { width: auto; min-width: 72px; white-space: nowrap; }
.compose-group { display: flex; gap: 8px; flex: 1 1 320px; max-width: 720px; align-items: flex-end; min-width: 0; }
.compose-group input { flex: 1; min-width: 0; margin-bottom: 0; width: auto; }
.compose-group .btn { flex-shrink: 0; margin-bottom: 0; }
.btn { padding: 7px 14px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 13px; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
th { color: var(--text2); font-weight: 500; font-size: 11px; text-transform: uppercase; }
tr:hover td { background: var(--bg3); }
tr.selected td { background: #2a3050; }
.toggle { position: relative; width: 36px; height: 20px; display: inline-block; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle span { position: absolute; inset: 0; background: var(--bg3); border-radius: 20px; cursor: pointer; transition: .2s; }
.toggle span:before { content: ""; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: var(--text2); border-radius: 50%; transition: .2s; }
.toggle input:checked + span { background: var(--accent); }
.toggle input:checked + span:before { transform: translateX(16px); background: #fff; }
.msg-list { display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; }
.msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
.msg-bubble.user { align-self: flex-start; background: var(--bg3); border-bottom-left-radius: 4px; }
.msg-bubble.assistant { align-self: flex-end; background: #1e3a5f; border-bottom-right-radius: 4px; }
.msg-bubble.system { align-self: center; background: var(--mem-bg); font-size: 12px; color: var(--text2); max-width: 90%; }
.msg-role { font-size: 10px; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; }
.ctx-msg { padding: 10px 14px; border-radius: var(--radius); margin-bottom: 8px; font-size: 13px; border-left: 4px solid var(--border); }
.ctx-msg.system { background: var(--sys-bg); border-left-color: #3b82f6; }
.ctx-msg.memory { background: var(--mem-bg); border-left-color: var(--text2); }
.ctx-msg.session { background: var(--bg3); border-left-color: var(--accent); }
.ctx-meta { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.ctx-content { white-space: pre-wrap; word-break: break-word; font-family: var(--mono); font-size: 12px; }
.status-bar { display: flex; align-items: center; gap: 20px; padding: 6px 16px; background: var(--bg2); border-top: 1px solid var(--border); font-size: 12px; color: var(--text2); flex-wrap: wrap; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.status-dot.ok { background: var(--accent2); }
.status-dot.err { background: var(--danger); }
.status-dot.off { background: var(--text2); }
.status-bar input { width: 200px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 3px 8px; border-radius: 4px; font-size: 12px; }
.empty { color: var(--text2); font-size: 13px; padding: 20px; text-align: center; }
.log-row { cursor: pointer; }
.log-detail { display: none; padding: 12px; background: var(--bg3); font-family: var(--mono); font-size: 11px; white-space: pre-wrap; }
.log-detail.open { display: block; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
.badge.ok { background: #14532d; color: var(--accent2); }
.badge.err { background: #450a0a; color: var(--danger); }
.token-est { font-size: 12px; color: var(--warn); margin-top: 8px; }
.error-msg { color: var(--danger); font-size: 13px; padding: 8px; background: #450a0a33; border-radius: var(--radius); margin-bottom: 10px; }
@media (prefers-color-scheme: light) {
  :root { --bg: #f5f6fa; --bg2: #fff; --bg3: #eef0f6; --border: #d8dbe8; --text: #1a1d27; --text2: #6b7280; --sys-bg: #dbeafe; --mem-bg: #f3f4f6; }
}
</style>
</head>
<body>
<div class="container">
  <aside class="sidebar-left">
    <div class="sidebar-title">Agents</div>
    <div id="agent-list"></div>
    <div class="sidebar-add">
      <input id="new-agent-id" placeholder="agent_id" />
      <button onclick="addAgent()">+ 注册 Agent</button>
    </div>
  </aside>
  <aside class="sidebar-middle">
    <div class="sidebar-title">Users / Sessions</div>
    <div id="user-tree"></div>
    <div class="sidebar-add">
      <input id="new-user-id" placeholder="user_id" />
      <button onclick="addUser()">+ 添加 User</button>
      <input id="new-session-id" placeholder="session_id (可选)" style="margin-top:6px" />
      <button onclick="createSession()" style="margin-top:6px">+ 创建 Session</button>
    </div>
  </aside>
  <main class="main-area">
    <nav class="tabs" id="tabs">
      <button data-tab="agent" class="active">Agent Info</button>
      <button data-tab="user">User Memory</button>
      <button data-tab="session">Session</button>
      <button data-tab="context">Context Preview</button>
      <button data-tab="llm">LLM Logs</button>
    </nav>
    <section class="tab-content" id="tab-content"></section>
  </main>
</div>
<footer class="status-bar">
  <span>API Base: <input id="api-base" value="http://localhost:8080" onchange="saveConfig()" /></span>
  <span>Key: <input id="api-key" value="dev-secret" onchange="saveConfig()" /></span>
  <span id="st-api"><span class="status-dot off"></span>Checking...</span>
  <span id="st-pgvector"><span class="status-dot off"></span>pgvector</span>
  <span id="st-llm"><span class="status-dot off"></span>LLM</span>
</footer>

<script>
const LS_KEY = "amm_debug_state";
const DEFAULTS = { apiBase: "http://localhost:8080", configVersion: 2 };
let state = {
  ...DEFAULTS,
  apiKey: "dev-secret",
  agents: [],
  users: {},
  selectedAgent: null,
  selectedUser: null,
  selectedSession: null,
  agentData: null,
  agentSkills: [],
  userProfile: null,
  memories: [],
  messages: [],
  contextData: null,
  llmLogs: [],
  tab: "agent",
};

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
    Object.assign(state, saved);
    if (!saved.configVersion || saved.configVersion < 2) {
      state.apiBase = DEFAULTS.apiBase;
      state.configVersion = DEFAULTS.configVersion;
    }
  } catch (_) {}
  document.getElementById("api-base").value = state.apiBase;
  document.getElementById("api-key").value = state.apiKey;
  if (location.hash.startsWith("#tab=")) state.tab = location.hash.slice(5);
}

function persist() {
  localStorage.setItem(LS_KEY, JSON.stringify({
    apiBase: state.apiBase, apiKey: state.apiKey, configVersion: state.configVersion,
    agents: state.agents, users: state.users,
    selectedAgent: state.selectedAgent, selectedUser: state.selectedUser,
    selectedSession: state.selectedSession, llmLogs: state.llmLogs.slice(-50),
  }));
}

function saveConfig() {
  state.apiBase = document.getElementById("api-base").value.replace(/\/$/, "");
  state.apiKey = document.getElementById("api-key").value;
  persist();
  checkHealth();
}

async function api(method, path, body) {
  const url = state.apiBase + path;
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (state.apiKey) opts.headers["X-API-Key"] = state.apiKey;
  if (body) opts.body = JSON.stringify(body);
  const t0 = performance.now();
  const resp = await fetch(url, opts);
  const elapsed = Math.round(performance.now() - t0);
  const text = await resp.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch (_) { data = text; }
  if (!resp.ok) throw { status: resp.status, detail: data, elapsed };
  return { data, elapsed };
}

function logAction(op, detail, elapsed, ok = true) {
  state.llmLogs.unshift({ time: new Date().toISOString(), op, detail, elapsed, ok });
  if (state.llmLogs.length > 100) state.llmLogs.length = 100;
  persist();
}

async function checkHealth() {
  const stApi = document.getElementById("st-api");
  const stPg = document.getElementById("st-pgvector");
  try {
    const { data } = await api("GET", "/api/v1/health");
    stApi.innerHTML = '<span class="status-dot ok"></span>Connected';
    stPg.innerHTML = data.pgvector
      ? '<span class="status-dot ok"></span>pgvector Ready'
      : '<span class="status-dot err"></span>pgvector Missing';
    updateLlmStatus();
  } catch (_) {
    stApi.innerHTML = '<span class="status-dot err"></span>Disconnected';
    stPg.innerHTML = '<span class="status-dot off"></span>pgvector';
    document.getElementById("st-llm").innerHTML = '<span class="status-dot off"></span>LLM Unknown';
  }
}

function updateLlmStatus() {
  const st = document.getElementById("st-llm");
  const cfg = state.agentData?.config?.llm;
  if (cfg?.api_key) {
    st.innerHTML = `<span class="status-dot ok"></span>LLM Enabled (${cfg.model || "gpt-4o-mini"})`;
  } else {
    st.innerHTML = '<span class="status-dot off"></span>LLM Disabled';
  }
}

function renderSidebars() {
  const al = document.getElementById("agent-list");
  al.innerHTML = state.agents.length ? state.agents.map(a =>
    `<div class="sidebar-item ${a === state.selectedAgent ? "active" : ""}" onclick="selectAgent('${a}')">${a}</div>`
  ).join("") : '<div class="empty">暂无 Agent</div>';

  const ut = document.getElementById("user-tree");
  const users = Object.keys(state.users);
  if (!users.length) { ut.innerHTML = '<div class="empty">暂无 User</div>'; return; }
  ut.innerHTML = users.map(uid => {
    const sessions = state.users[uid] || [];
    const uActive = uid === state.selectedUser;
    let html = `<div class="sidebar-item ${uActive && !state.selectedSession ? "active" : ""}" onclick="selectUser('${uid}')">${uid}<small>${sessions.length} sessions</small></div>`;
    if (uActive) {
      html += sessions.map(s =>
        `<div class="sidebar-item ${s === state.selectedSession ? "active" : ""}" style="padding-left:28px;font-size:12px" onclick="selectSession('${uid}','${s}')">${s}</div>`
      ).join("");
    }
    return html;
  }).join("");
}

function switchTab(tab) {
  state.tab = tab;
  location.hash = "tab=" + tab;
  document.querySelectorAll(".tabs button").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  renderTab();
}

document.getElementById("tabs").addEventListener("click", e => {
  if (e.target.dataset.tab) switchTab(e.target.dataset.tab);
});

async function selectAgent(id) {
  state.selectedAgent = id;
  persist();
  renderSidebars();
  try {
    const { data, elapsed } = await api("GET", `/api/v1/agents/${id}`);
    state.agentData = data;
    const r2 = await api("GET", `/api/v1/agents/${id}/skills`);
    state.agentSkills = r2.data;
    logAction("GET agent", JSON.stringify(data, null, 2), elapsed);
    updateLlmStatus();
  } catch (e) {
    state.agentData = null;
    state.agentSkills = [];
  }
  if (state.tab === "agent") renderTab();
}

function selectUser(uid) {
  state.selectedUser = uid;
  state.selectedSession = null;
  persist();
  renderSidebars();
  loadUserData();
}

async function selectSession(uid, sid) {
  state.selectedUser = uid;
  state.selectedSession = sid;
  persist();
  renderSidebars();
  await loadUserData();
  await loadMessages();
  if (state.tab === "session") renderTab();
}

async function loadUserData() {
  if (!state.selectedUser) return;
  try {
    const { data } = await api("GET", `/api/v1/users/${state.selectedUser}/profile`);
    state.userProfile = data;
  } catch (_) {
    state.userProfile = { user_id: state.selectedUser, profile: {} };
  }
  if (state.tab === "user") renderTab();
}

async function loadMessages() {
  if (!state.selectedSession) return;
  try {
    const { data } = await api("GET", `/api/v1/sessions/${state.selectedSession}/messages?limit=100`);
    state.messages = data;
  } catch (_) { state.messages = []; }
  if (state.tab === "session") renderTab();
}

async function addAgent() {
  const id = document.getElementById("new-agent-id").value.trim();
  if (!id) return;
  try {
    await api("POST", "/api/v1/agents", { agent_id: id, name: id, persona: "", config: {} });
    if (!state.agents.includes(id)) state.agents.push(id);
    document.getElementById("new-agent-id").value = "";
    await selectAgent(id);
  } catch (e) {
    if (e.status === 409) {
      if (!state.agents.includes(id)) state.agents.push(id);
      document.getElementById("new-agent-id").value = "";
      await selectAgent(id);
    } else {
      alert("注册失败: " + JSON.stringify(e.detail));
    }
  }
}

function addUser() {
  const uid = document.getElementById("new-user-id").value.trim();
  if (!uid) return;
  if (!state.users[uid]) state.users[uid] = [];
  document.getElementById("new-user-id").value = "";
  api("PUT", `/api/v1/users/${uid}`)
    .catch(() => {})
    .finally(() => selectUser(uid));
}

async function createSession() {
  if (!state.selectedAgent) { alert("请先选择 Agent"); return; }
  const uid = document.getElementById("new-user-id").value.trim() || state.selectedUser;
  if (!uid) { alert("请输入 user_id"); return; }
  const sid = document.getElementById("new-session-id").value.trim() || null;
  if (!state.users[uid]) state.users[uid] = [];
  try {
    const body = { agent_id: state.selectedAgent, user_id: uid };
    if (sid) body.session_id = sid;
    const { data, elapsed } = await api("POST", "/api/v1/sessions", body);
    if (!state.users[uid].includes(data.session_id)) state.users[uid].push(data.session_id);
    state.selectedUser = uid;
    state.selectedSession = data.session_id;
    document.getElementById("new-session-id").value = "";
    logAction("POST session", JSON.stringify(data, null, 2), elapsed);
    persist();
    renderSidebars();
    await loadMessages();
    switchTab("session");
  } catch (e) { alert("创建失败: " + JSON.stringify(e.detail)); }
}

function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;"); }
function trunc(s, n) { return s.length > n ? s.slice(0, n) + "…" : s; }

function renderTab() {
  const el = document.getElementById("tab-content");
  switch (state.tab) {
    case "agent": el.innerHTML = renderAgentTab(); break;
    case "user": el.innerHTML = renderUserTab(); break;
    case "session": el.innerHTML = renderSessionTab(); break;
    case "context": el.innerHTML = renderContextTab(); break;
    case "llm": el.innerHTML = renderLlmTab(); break;
  }
}

function renderAgentTab() {
  if (!state.selectedAgent) return '<div class="empty">← 选择或注册 Agent</div>';
  const a = state.agentData;
  if (!a) return '<div class="empty">加载中...</div>';
  const skillsHtml = state.agentSkills.length ? `<table><thead><tr><th>Skill</th><th>Triggers</th><th>Enabled</th><th></th></tr></thead><tbody>${
    state.agentSkills.map(s => `<tr><td>${esc(s.name)}</td><td>${esc((s.trigger_keys||[]).join(", "))}</td><td><label class="toggle"><input type="checkbox" ${s.enabled?"checked":""} onchange="toggleSkill('${s.skill_id}', this.checked)" /><span></span></label></td><td><button class="btn btn-danger btn-sm" onclick="unbindSkill('${s.skill_id}')">解绑</button></td></tr>`).join("")
  }</tbody></table>` : '<div class="empty">未绑定 Skill</div>';
  return `
    <div class="panel"><h3>Agent: ${esc(a.agent_id)}</h3>
      <div class="row">
        <div><label>Name</label><input id="ag-name" value="${esc(a.name)}" /></div>
        <div><label>Status</label><input id="ag-status" value="${esc(a.status)}" /></div>
      </div>
      <label>Persona</label><textarea id="ag-persona">${esc(a.persona)}</textarea>
      <label>Config (JSON)</label><textarea id="ag-config" class="json-editor">${esc(JSON.stringify(a.config||{}, null, 2))}</textarea>
      <div style="margin-top:10px">
        <button class="btn btn-primary" onclick="saveAgent()">保存配置</button>
        <button class="btn btn-secondary" onclick="bindSkillPrompt()">绑定 Skill</button>
      </div>
    </div>
    <div class="panel"><h3>Skills</h3>${skillsHtml}</div>`;
}

async function saveAgent() {
  try {
    const config = JSON.parse(document.getElementById("ag-config").value);
    const body = {
      name: document.getElementById("ag-name").value,
      persona: document.getElementById("ag-persona").value,
      config, status: document.getElementById("ag-status").value,
    };
    const { data, elapsed } = await api("PATCH", `/api/v1/agents/${state.selectedAgent}`, body);
    state.agentData = data;
    logAction("PATCH agent", JSON.stringify(body, null, 2), elapsed);
    updateLlmStatus();
    renderTab();
  } catch (e) { alert("保存失败: " + (e.detail?.detail || e.message || JSON.stringify(e))); }
}

async function bindSkillPrompt() {
  const sid = prompt("输入 skill_id (UUID):");
  if (!sid) return;
  try {
    const { elapsed } = await api("POST", `/api/v1/agents/${state.selectedAgent}/skills/${sid}`);
    logAction("POST bind skill", sid, elapsed);
    const r2 = await api("GET", `/api/v1/agents/${state.selectedAgent}/skills`);
    state.agentSkills = r2.data;
    renderTab();
  } catch (e) { alert("绑定失败"); }
}

async function toggleSkill(skillId, enabled) {
  try {
    await api("PATCH", `/api/v1/agents/${state.selectedAgent}/skills/${skillId}`, { enabled });
    const r2 = await api("GET", `/api/v1/agents/${state.selectedAgent}/skills`);
    state.agentSkills = r2.data;
  } catch (_) { alert("更新 Skill 状态失败"); renderTab(); }
}

async function unbindSkill(sid) {
  try {
    await api("DELETE", `/api/v1/agents/${state.selectedAgent}/skills/${sid}`);
    const r2 = await api("GET", `/api/v1/agents/${state.selectedAgent}/skills`);
    state.agentSkills = r2.data;
    renderTab();
  } catch (_) { alert("解绑失败"); }
}

function renderUserTab() {
  if (!state.selectedUser) return '<div class="empty">← 选择 User</div>';
  const prof = state.userProfile?.profile || {};
  const memHtml = state.memories.length ? `<table><thead><tr><th></th><th>Type</th><th>Content</th><th>Imp.</th><th>Score</th><th></th></tr></thead><tbody>${
    state.memories.map(m => `<tr><td><input type="checkbox" class="mem-check" value="${m.fragment_id}" /></td><td>${esc(m.type)}</td><td>${esc(trunc(m.content,60))}</td><td>${m.importance?.toFixed(2)||"-"}</td><td>${m.score?.toFixed(3)||"-"}</td><td><button class="btn btn-danger btn-sm" onclick="deleteMemory('${m.fragment_id}')">删</button></td></tr>`).join("")
  }</tbody></table>` : '<div class="empty">无记忆，请搜索或添加</div>';
  return `
    <div class="panel"><h3>User: ${esc(state.selectedUser)}</h3>
      <label>Profile (JSON)</label>
      <textarea id="user-profile" class="json-editor">${esc(JSON.stringify(prof, null, 2))}</textarea>
      <button class="btn btn-primary" onclick="saveProfile()">保存 Profile</button>
    </div>
    <div class="panel"><h3>记忆检索</h3>
      <div class="form-row">
        <div class="field field-grow"><label>关键词</label><input id="mem-query" placeholder="全文检索关键词" /></div>
        <div class="field field-sm"><label>top_k</label><input id="mem-topk" type="number" value="10" min="1" max="100" /></div>
        <div class="field field-md"><label>type</label><input id="mem-type" placeholder="fact / preference" /></div>
        <div class="field field-action"><label aria-hidden="true">&nbsp;</label><button class="btn btn-primary" onclick="searchMemories()">搜索</button></div>
      </div>
      ${memHtml}
      <div style="margin-top:12px">
        <button class="btn btn-danger btn-sm" onclick="deleteSelectedMemories()">删除选中</button>
      </div>
    </div>
    <div class="panel"><h3>手动添加记忆</h3>
      <div class="form-row">
        <div class="field field-md"><label>type</label><input id="add-type" value="fact" /></div>
        <div class="field field-grow"><label>content</label><input id="add-content" placeholder="记忆内容" /></div>
        <div class="field field-sm"><label>importance</label><input id="add-imp" type="number" value="0.5" step="0.1" min="0" max="1" /></div>
        <div class="field field-action"><label aria-hidden="true">&nbsp;</label><button class="btn btn-primary" onclick="addMemory()">添加</button></div>
      </div>
    </div>`;
}

async function saveProfile() {
  try {
    const profile = JSON.parse(document.getElementById("user-profile").value);
    await api("PUT", `/api/v1/users/${state.selectedUser}`);
    const { data, elapsed } = await api("PATCH", `/api/v1/users/${state.selectedUser}/profile`, { profile });
    state.userProfile = data;
    logAction("PATCH profile", JSON.stringify(profile, null, 2), elapsed);
    alert("Profile 已保存");
  } catch (e) { alert("保存失败，用户可能不存在。请先添加记忆以创建用户。"); }
}

async function searchMemories() {
  const q = document.getElementById("mem-query")?.value || "";
  const top_k = document.getElementById("mem-topk")?.value || 10;
  const type = document.getElementById("mem-type")?.value || "";
  let path = `/api/v1/users/${state.selectedUser}/memories?top_k=${top_k}`;
  if (q) path += `&query=${encodeURIComponent(q)}`;
  if (type) path += `&type=${encodeURIComponent(type)}`;
  try {
    const { data, elapsed } = await api("GET", path);
    state.memories = data;
    logAction("GET memories", `query=${q} results=${data.length}`, elapsed);
    renderTab();
  } catch (e) {
    if (e.status === 404) { alert("用户不存在，请先从左侧添加 User"); return; }
    alert("搜索失败");
  }
}

async function addMemory() {
  const body = {
    type: document.getElementById("add-type").value,
    content: document.getElementById("add-content").value,
    importance: parseFloat(document.getElementById("add-imp").value),
  };
  try {
    const { elapsed } = await api("POST", `/api/v1/users/${state.selectedUser}/memories`, body);
    logAction("POST memory", body.content, elapsed);
    await searchMemories();
  } catch (e) { alert("添加失败: " + JSON.stringify(e.detail)); }
}

async function deleteMemory(fid) {
  try {
    await api("DELETE", `/api/v1/users/${state.selectedUser}/memories/${fid}`);
    await searchMemories();
  } catch (_) { alert("删除失败"); }
}

async function deleteSelectedMemories() {
  document.querySelectorAll(".mem-check:checked").forEach(async cb => {
    await api("DELETE", `/api/v1/users/${state.selectedUser}/memories/${cb.value}`);
  });
  await searchMemories();
}

function renderSessionTab() {
  if (!state.selectedSession) return '<div class="empty">← 选择 Session 或创建新会话</div>';
  const msgs = state.messages.map(m => {
    const cls = m.role === "assistant" ? "assistant" : m.role === "system" ? "system" : "user";
    return `<div class="msg-bubble ${cls}"><div class="msg-role">${esc(m.role)} · ${new Date(m.created_at).toLocaleTimeString()}</div>${esc(m.content)}</div>`;
  }).join("");
  return `
    <div class="panel"><h3>Session: ${esc(state.selectedSession)}</h3>
      <div class="msg-list">${msgs || '<div class="empty">暂无消息</div>'}</div>
    </div>
    <div class="panel"><h3>追加测试消息</h3>
      <div class="form-row">
        <div class="field field-md"><label>role</label><select id="msg-role"><option>user</option><option>assistant</option><option>system</option></select></div>
        <div class="compose-group">
          <input id="msg-content" placeholder="消息内容" aria-label="消息内容" />
          <button class="btn btn-primary" onclick="addMessage()">发送</button>
        </div>
      </div>
      <div style="margin-top:10px">
        <button class="btn btn-secondary" onclick="loadMessages()">刷新消息</button>
        <button class="btn btn-secondary" onclick="endSession()">结束会话</button>
      </div>
    </div>`;
}

async function addMessage() {
  const body = { role: document.getElementById("msg-role").value, content: document.getElementById("msg-content").value };
  try {
    const { data, elapsed } = await api("POST", `/api/v1/sessions/${state.selectedSession}/messages`, body);
    logAction("POST message (LLM async)", body.content, elapsed);
    document.getElementById("msg-content").value = "";
    await loadMessages();
  } catch (e) { alert("发送失败"); }
}

async function endSession() {
  try {
    await api("PATCH", `/api/v1/sessions/${state.selectedSession}`, { status: "completed" });
    logAction("PATCH session", "status=completed", 0);
    alert("会话已结束");
  } catch (_) { alert("操作失败"); }
}

function toMessages(ctx) {
  const messages = [];
  const am = ctx.agent_memory, um = ctx.user_memory, sm = ctx.session_memory;
  const sysParts = [am.persona || ""];
  (am.skills || []).forEach(s => sysParts.push(`\n[技能：${s.name}]\n${s.prompt_snippet}`));
  if (um.profile && Object.keys(um.profile).length) {
    const ps = Object.entries(um.profile).map(([k,v]) => typeof v === "object" ? `${k}=${v.v||JSON.stringify(v)}` : `${k}=${v}`).join(", ");
    sysParts.push(`\n用户偏好：${ps}`);
  }
  messages.push({ role: "system", content: sysParts.join("\n\n"), _src: "system" });
  (um.fragments || []).forEach(f => messages.push({ role: "user", content: `[历史记忆] ${f.content}`, _src: "memory" }));
  (sm.messages || []).forEach(m => messages.push({ role: m.role, content: m.content, _src: "session" }));
  return messages;
}

function estTokens(msgs) {
  const chars = msgs.reduce((s, m) => s + (m.content?.length || 0), 0);
  return Math.ceil(chars / 4);
}

function renderContextTab() {
  const sel = `
    <div class="panel"><h3>选择上下文来源</h3>
      <div class="row">
        <div><label>Agent</label><input value="${esc(state.selectedAgent||"")}" disabled /></div>
        <div><label>User</label><input value="${esc(state.selectedUser||"")}" disabled /></div>
        <div><label>Session</label><input value="${esc(state.selectedSession||"")}" disabled /></div>
      </div>
      <label>Query (可选，用于语义检索)</label>
      <input id="ctx-query" placeholder="检索 query" />
      <button class="btn btn-primary" style="margin-top:8px" onclick="refreshContext()">刷新上下文</button>
    </div>`;
  if (!state.contextData) return sel + '<div class="empty">点击「刷新上下文」预览 to_messages() 输出</div>';
  const msgs = toMessages(state.contextData);
  const msgHtml = msgs.map((m, i) => {
    const cls = m._src === "system" ? "system" : m._src === "memory" ? "memory" : "session";
    return `<div class="ctx-msg ${cls}"><div class="ctx-meta">[${i}] ${m.role} · ${m._src}</div><div class="ctx-content">${esc(m.content)}</div></div>`;
  }).join("");
  return sel + `
    <div class="panel"><h3>to_messages() 预览</h3>
      <div class="token-est">估算 Token: ~${estTokens(msgs)}</div>
      ${msgHtml}
      <div style="margin-top:12px">
        <button class="btn btn-secondary" onclick="copyContext('messages')">复制 messages 数组</button>
        <button class="btn btn-secondary" onclick="copyContext('json')">复制完整 JSON</button>
      </div>
    </div>`;
}

async function refreshContext() {
  if (!state.selectedAgent || !state.selectedUser || !state.selectedSession) {
    alert("请先选择 Agent、User 和 Session"); return;
  }
  const query = document.getElementById("ctx-query")?.value || null;
  const body = { agent_id: state.selectedAgent, user_id: state.selectedUser, session_id: state.selectedSession, query };
  try {
    const { data, elapsed } = await api("POST", "/api/v1/context", body);
    state.contextData = data;
    logAction("POST context", `messages=${data.session_memory?.messages?.length||0}`, elapsed);
    renderTab();
  } catch (e) { alert("上下文获取失败"); }
}

function copyContext(mode) {
  const text = mode === "json" ? JSON.stringify(state.contextData, null, 2) : JSON.stringify(toMessages(state.contextData), null, 2);
  navigator.clipboard.writeText(text).then(() => alert("已复制"));
}

function renderLlmTab() {
  const cfg = state.agentData?.config;
  const llmOn = cfg?.llm?.api_key;
  const embOn = cfg?.embedding?.api_key || llmOn;
  const statusHtml = `
    <div class="panel"><h3>LLM 配置状态</h3>
      <p>Chat LLM: <span class="badge ${llmOn?"ok":"err"}">${llmOn ? (cfg.llm.model||"gpt-4o-mini") : "Disabled"}</span></p>
      <p>Embedding: <span class="badge ${embOn?"ok":"err"}">${embOn ? (cfg.embedding?.model||"text-embedding-3-small") : "Disabled"}</span></p>
      <p style="color:var(--text2);font-size:12px;margin-top:8px">LLM 在消息追加后异步执行：embedding → 摘要(>40条) → 记忆提取。下方为 Debug 控制台操作日志。</p>
    </div>`;
  const logHtml = state.llmLogs.length ? `<table><thead><tr><th>时间</th><th>操作</th><th>耗时</th><th>状态</th></tr></thead><tbody>${
    state.llmLogs.map((l, i) => `<tr class="log-row" onclick="toggleLog(${i})"><td>${new Date(l.time).toLocaleTimeString()}</td><td>${esc(l.op)}</td><td>${l.elapsed}ms</td><td><span class="badge ${l.ok?"ok":"err"}">${l.ok?"OK":"ERR"}</span></td></tr><tr><td colspan="4"><div class="log-detail" id="log-${i}">${esc(l.detail||"")}</div></td></tr>`).join("")
  }</tbody></table>` : '<div class="empty">暂无操作日志</div>';
  return statusHtml + `<div class="panel"><h3>操作日志</h3>${logHtml}</div>`;
}

function toggleLog(i) {
  const el = document.getElementById("log-" + i);
  if (el) el.classList.toggle("open");
}

loadState();
renderSidebars();
switchTab(state.tab);
checkHealth();
setInterval(checkHealth, 30000);
</script>
</body>
</html>
